<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Content Detector</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      header h1 {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        line-height: 1.2;
      }

      header .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      header .dot.off {
        background: #555;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #16213e;
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 8px;
      }

      .row label {
        font-size: 13px;
        color: #ccc;
      }

      /* Toggle switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #444;
        border-radius: 22px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      input:checked + .slider {
        background: #4caf50;
      }

      input:checked + .slider::before {
        transform: translateX(18px);
      }

      /* Training stats */
      .stats {
        background: #16213e;
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 8px;
      }

      .stats-title {
        font-size: 11px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      .stats-counts {
        font-size: 13px;
        color: #ccc;
        margin-bottom: 4px;
      }

      .stats-counts .ai-count  { color: #ef5350; }
      .stats-counts .real-count { color: #66bb6a; }

      .stats-status {
        font-size: 11px;
        color: #888;
      }

      .stats-status.active { color: #66bb6a; }

      /* Export button */
      .btn-export {
        width: 100%;
        padding: 9px;
        background: #0f3460;
        color: #90caf9;
        border: 1px solid #1a4a8a;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        margin-bottom: 8px;
      }

      .btn-export:hover { background: #1a4a8a; }
      .btn-export:disabled { opacity: 0.4; cursor: default; }

      footer {
        font-size: 10px;
        color: #555;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="dot" id="statusDot"></div>
      <h1>AI Content Detector</h1>
    </header>

    <div class="row">
      <label for="toggle">Filter AI content</label>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats">
      <div class="stats-title">Training data</div>
      <div class="stats-counts" id="statsCounts">Loading…</div>
      <div class="stats-status" id="statsStatus"></div>
    </div>

    <button class="btn-export" id="btnExport">Export training data</button>

    <footer>Active on YouTube</footer>

    <script src="popup.js"></script>
  </body>
</html>
